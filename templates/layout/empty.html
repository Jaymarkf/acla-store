<!DOCTYPE html>
<html>
<head>
    <title>{{ head.title }}</title>
    {{{ head.meta_tags }}}
    {{{ head.config }}}

    <link href="{{ head.favicon }}" rel="shortcut icon">
    {{#block "head"}}{{/block}}
    <style>
        .checkoutHeader.optimizedCheckout-header{
            background-color:white;
        }
        .checkoutHeader.optimizedCheckout-header img{
            max-width:150px;
        }
    </style>
</head>
<body>
    {{#block "page"}}{{/block}}

<script>
(function() {

    function formatPhone(digits) {
        if (digits.length > 6) {
            return `(${digits.substring(0,3)})${digits.substring(3,6)}-${digits.substring(6,10)}`;
        } else if (digits.length > 3) {
            return `(${digits.substring(0,3)})${digits.substring(3,6)}`;
        } else if (digits.length > 0) {
            return `(${digits}`;
        }
        return '';
    }

    // 🔥 CRITICAL: React-safe setter
    function setNativeValue(element, value) {
        const valueSetter = Object.getOwnPropertyDescriptor(element, 'value')?.set;
        const prototype = Object.getPrototypeOf(element);
        const prototypeSetter = Object.getOwnPropertyDescriptor(prototype, 'value')?.set;

        if (prototypeSetter && valueSetter !== prototypeSetter) {
            prototypeSetter.call(element, value);
        } else if (valueSetter) {
            valueSetter.call(element, value);
        } else {
            element.value = value;
        }

        // 🔥 THIS is what React listens to
        element.dispatchEvent(new Event('input', { bubbles: true }));
    }

    function attachFormatter(input) {
        if (!input || input.dataset.maskAttached) return;

        input.addEventListener('input', function(e) {
            let digits = e.target.value.replace(/\D/g, '').substring(0, 10);

            let formatted = formatPhone(digits);

            // 🔥 Use native setter instead of direct assignment
            setNativeValue(e.target, formatted);
        });

        input.dataset.maskAttached = 'true';
    }

    function init() {
        const input = document.getElementById('phoneInput');
        if (input) {
            attachFormatter(input);
        }
    }

    // Initial run
    init();

    // Watch for re-render (shipping/billing switch)
    const observer = new MutationObserver(() => {
        const input = document.getElementById('phoneInput');
        if (input && !input.dataset.maskAttached) {
            attachFormatter(input);
        }
    });

    observer.observe(document.body, {
        childList: true,
        subtree: true
    });

})();
</script>
</body>
</html>
