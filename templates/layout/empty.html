<!DOCTYPE html>
<html>
<head>
    <title>{{ head.title }}</title>
    {{{ head.meta_tags }}}
    {{{ head.config }}}

    <link href="{{ head.favicon }}" rel="shortcut icon">
    {{#block "head"}}{{/block}}
    <style>
        .checkoutHeader.optimizedCheckout-header{
            background-color:white;
        }
        .checkoutHeader.optimizedCheckout-header img{
            max-width:150px;
        }
    </style>
</head>
<body>
    {{#block "page"}}{{/block}}
<script>
(function() {
    // Function to attach the phone formatter to an input
    function attachPhoneFormatter(input) {
        if (input.dataset.maskAttached) return; // already attached
        input.addEventListener('input', function(e) {
            let x = e.target.value.replace(/\D/g, '').substring(0,10); // only digits
            let formatted = x;
            if (x.length > 6) {
                formatted = `(${x.substring(0,3)})${x.substring(3,6)}-${x.substring(6,10)}`;
            } else if (x.length > 3) {
                formatted = `(${x.substring(0,3)})${x.substring(3,6)}`;
            } else if (x.length > 0) {
                formatted = `(${x}`;
            }
            e.target.value = formatted;
        });
        input.dataset.maskAttached = 'true';
    }

    // Observer callback
    const observer = new MutationObserver((mutations) => {
        for (const mutation of mutations) {
            if (mutation.type === 'childList') {
                mutation.addedNodes.forEach(node => {
                    if (node.nodeType === 1) { // element
                        // Look for the phone input inside the added node
                        const phoneInput = node.querySelector('input[type="tel"]');
                        if (phoneInput) {
                            attachPhoneFormatter(phoneInput);
                        }
                        // Also check if the node itself is the input
                        if (node.matches && node.matches('input[type="tel"]')) {
                            attachPhoneFormatter(node);
                        }
                    }
                });
            }
        }
    });

    // Start observing the body for any added nodes
    observer.observe(document.body, {
        childList: true,
        subtree: true
    });

    // Run once for existing phone inputs
    document.querySelectorAll('input[type="tel"]').forEach(input => attachPhoneFormatter(input));
})();
</script>
</body>
</html>
