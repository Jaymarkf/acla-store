<div class="form-field show-selected-option" data-product-attribute="set-rectangle">
    <label class="form-label form-label--alternate form-label--inlineSmall">
        {{this.display_name}}:
        <span data-option-value></span>
        {{#if required}}
            <small class="required-label">{{lang 'common.required'}}</small>
        {{/if}}
    </label>
    {{#each this.values}}
        <input
            class="form-radio"
            type="radio"
            id="attribute_rectangle_{{../id}}_{{id}}"
            data-option-label="{{this.label}}"
            name="attribute[{{../id}}]"
            value="{{id}}"
            {{#if selected}}
                checked
                data-default
            {{/if}}
            {{#if ../required}}required{{/if}}>
            <label class="form-option" for="attribute_rectangle_{{../id}}_{{id}}" data-product-attribute-value="{{id}}"
            custom-attribute-sku="{{#each ../cart}}{{#each options}}{{#if value '==' ../../this.label}}{{../../sku}}{{/if}}{{/each}}{{/each}}"
            custom-attribute-cart-quantity="{{#each ../cart}}{{#each options}}{{#if value '==' ../../this.label}}{{../../quantity}}{{/if}}{{/each}}{{/each}}">
            <span class="form-option-variant">{{this.label}}</span>
        </label>
    {{/each}}
</div>
